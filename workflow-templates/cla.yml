name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event.comment.body == 'recheck') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/forkjoin-ai/.github/blob/main/CLA.md
          branch: main
          allowlist: buley,dependabot[bot],github-actions[bot],renovate[bot]
          remote-organization-name: forkjoin-ai
          remote-repository-name: .github
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge this, you need to sign our
            [Contributor License Agreement](https://github.com/forkjoin-ai/.github/blob/main/CLA.md).


            To sign, please comment on this PR with exactly:


            > I have read the CLA Document and I hereby sign the CLA


            This is a one-time process. Once signed, it applies to all Fork Join AI repositories.
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
